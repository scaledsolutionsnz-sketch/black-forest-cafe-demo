<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Private Feedback — Black Forest Cafe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root{--primary:#1c1410;--accent:#c8813a;--cream:#f5efe6;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
    .card{background:#fff;border-radius:24px;padding:3rem 2.5rem;max-width:500px;width:100%;box-shadow:0 20px 60px rgba(28,20,16,0.1);}
    .logo{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;color:var(--primary);margin-bottom:1.5rem;text-align:center;}
    .logo span{color:var(--accent);}
    h1{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;margin-bottom:0.5rem;}
    .sub{font-size:0.9rem;color:#6b5c4e;margin-bottom:2rem;line-height:1.6;}
    .form-group{margin-bottom:1.1rem;}
    label{display:block;font-size:0.78rem;font-weight:600;color:#6b5c4e;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.4rem;}
    input,select,textarea{width:100%;padding:0.78rem 1rem;border:1.5px solid #e8ddd4;border-radius:10px;font-size:0.9rem;font-family:'Inter',sans-serif;color:var(--primary);outline:none;transition:border-color 0.2s;background:#fff;}
    input:focus,select:focus,textarea:focus{border-color:var(--accent);}
    textarea{min-height:100px;resize:vertical;}
    select option{background:#fff;}
    .btn{width:100%;padding:0.9rem;background:var(--accent);color:#fff;border:none;border-radius:50px;font-size:0.92rem;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:background 0.2s;margin-top:0.5rem;}
    .btn:hover{background:#e09a52;}
    .success{display:none;text-align:center;padding:2rem 0;}
    .success-icon{font-size:3rem;margin-bottom:1rem;}
    .success h2{font-family:'Syne',sans-serif;font-size:1.4rem;margin-bottom:0.5rem;}
    .success p{font-size:0.9rem;color:#6b5c4e;}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Black Forest <span>Cafe</span></div>
    <div id="formSection">
      <h1>We'd love to hear from you</h1>
      <p class="sub">Thank you for taking the time to share your thoughts. Your feedback helps us improve for everyone.</p>
      <form action="https://api.staticforms.xyz/submit" method="post" id="feedbackForm">
        <input type="hidden" name="apiKey" value="sf_768da8d33927e7f4f241d0a6" />
        <div class="form-group">
          <label>Your Name</label>
          <input type="text" name="firstName" placeholder="Your name" required />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="your@email.com" required />
        </div>
        <div class="form-group">
          <label>Rating</label>
          <select name="rating" required>
            <option value="" disabled selected>Select your rating</option>
            <option value="1">1 Star — Poor</option>
            <option value="2">2 Stars — Below average</option>
            <option value="3">3 Stars — Good</option>
          </select>
        </div>
        <div class="form-group">
          <label>Your Feedback</label>
          <textarea name="message" placeholder="Tell us what we could do better…" required></textarea>
        </div>
        <button type="submit" class="btn">Send Feedback →</button>
      </form>
    </div>
    <div class="success" id="successSection">
      <div class="success-icon">🙏</div>
      <h2>Thank you for your feedback</h2>
      <p>We really appreciate you taking the time to let us know. We'll use your comments to keep improving.</p>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const rating = params.get('rating');
    if (rating) {
      const sel = document.querySelector('select[name="rating"]');
      if (sel) sel.value = rating;
    }
    document.getElementById('feedbackForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const form = this;
      fetch(form.action, { method: 'POST', body: new FormData(form) })
        .then(() => {
          document.getElementById('formSection').style.display = 'none';
          document.getElementById('successSection').style.display = 'block';
        })
        .catch(() => form.submit());
    });
  </script>
</body>
</html>
